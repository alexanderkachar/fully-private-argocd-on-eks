---
- name: "terraform init ({{ tf_dir | basename }})"
  ansible.builtin.command:
    argv: "{{ [tf_command, 'init', '-input=false', '-upgrade=false', '-no-color'] }}"
    chdir: "{{ tf_dir }}"
  register: tf_init
  changed_when: "'Terraform has been successfully initialized' in tf_init.stdout"

- name: "terraform state rm (pre-{{ tf_action }})"
  ansible.builtin.command:
    argv: "{{ [tf_command, 'state', 'rm', item] }}"
    chdir: "{{ tf_dir }}"
  loop: "{{ tf_state_rm }}"
  register: tf_rm
  failed_when: false
  changed_when: tf_rm.rc == 0

- name: Ensure Terraform stream log directory exists
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../logs/terraform"
    state: directory
    mode: "0755"

- name: Set Terraform stream state
  ansible.builtin.set_fact:
    tf_live_log_path: >-
      {{ playbook_dir }}/../logs/terraform/{{ tf_dir | basename }}-{{ tf_action }}.log
    tf_live_finished: false
    tf_live_line_count: 0
    tf_live_poll_count: 0
    tf_live_last_status: {}

- name: "terraform {{ tf_action }} ({{ tf_dir | basename }})"
  ansible.builtin.command:
    argv: >-
      {{ [playbook_dir ~ '/../../scripts/terraform-live.sh',
          tf_live_log_path, tf_command, tf_action, '-input=false', '-no-color']
         + (['-auto-approve'] if tf_auto_approve else [])
         + (tf_vars | dict2items
             | map(attribute='key') | list
             | zip(tf_vars | dict2items | map(attribute='value') | list)
             | map('list') | map('join', '=')
             | map('regex_replace', '^', '-var=') | list) }}
    chdir: "{{ tf_dir }}"
  async: "{{ tf_live_timeout }}"
  poll: 0
  register: tf_live_job
  changed_when: false

- name: "Stream terraform {{ tf_action }} output"
  ansible.builtin.include_tasks: stream.yml

- name: "Stop waiting if terraform {{ tf_action }} exceeded its timeout"
  ansible.builtin.fail:
    msg: >-
      terraform {{ tf_action }} in {{ tf_dir }} did not finish within
      {{ tf_live_timeout }} seconds. See {{ tf_live_log_path }}.
  when: not (tf_live_finished | bool)

- name: "Read final terraform {{ tf_action }} output"
  ansible.builtin.command:
    argv:
      - cat
      - "{{ tf_live_log_path }}"
  register: tf_result
  changed_when: false

- name: "Fail when terraform {{ tf_action }} failed"
  ansible.builtin.fail:
    msg: |-
      terraform {{ tf_action }} in {{ tf_dir }} failed with rc={{ tf_live_last_status.rc | default('unknown') }}.
      See {{ tf_live_log_path }}.

      {{ (tf_result.stdout_lines | default([]))[-80:] | join('\n') }}
  when: (tf_live_last_status.rc | default(1) | int) != 0

- name: "Report terraform {{ tf_action }} changes"
  ansible.builtin.command:
    argv:
      - /bin/true
  changed_when: >-
    ('Apply complete!' in tf_result.stdout)
    or ('Destroy complete!' in tf_result.stdout)
    or ('Resources: 0 added, 0 changed, 0 destroyed' not in tf_result.stdout
        and (tf_live_last_status.rc | default(1) | int) == 0)
