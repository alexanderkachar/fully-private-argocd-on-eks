---
# Manually trigger a Gitea restore from the latest S3 dump, or a specific key
# via `-e backup_key=manual/2026-05-21T12-00-00Z.zip`.

- name: Refresh inventory
  hosts: localhost
  gather_facts: false
  tags: ["always"]
  roles:
    - role: inventory_sync

- name: Restore Gitea from S3 backup
  hosts: localhost
  gather_facts: false
  roles:
    - role: restore_gitea
      vars:
        backup_key: "{{ backup_key | default('') }}"
