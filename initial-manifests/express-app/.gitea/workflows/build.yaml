name: Build and push

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "chart/**"
      - ".gitea/workflows/build.yaml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: app
          push: true
          # APP_ECR_IMAGE_URI is replaced by bootstrap-gitea.sh before push.
          tags: |
            APP_ECR_IMAGE_URI:${{ gitea.sha }}
            APP_ECR_IMAGE_URI:latest
