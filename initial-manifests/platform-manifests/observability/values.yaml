# Observability umbrella chart values for the fp-argo platform.
# All image repositories point at ECR (airgapped cluster has no public internet).
# ECR_REGISTRY is replaced by bootstrap-gitea.sh before this file is pushed to Gitea.
#
# Chart versions:
#   kube-prometheus-stack 84.5.0
#   loki                  7.0.0
#   promtail              6.17.1

storageClass:
  enabled: true
  name: observability-gp3
  isDefault: true
  provisioner: ebs.csi.aws.com
  reclaimPolicy: Delete
  volumeBindingMode: WaitForFirstConsumer
  allowVolumeExpansion: true
  parameters:
    type: gp3
    encrypted: "true"

kube-prometheus-stack:
  alertmanager:
    enabled: false

  prometheus:
    enabled: true
    prometheusSpec:
      image:
        registry: ECR_REGISTRY
        repository: prometheus
        tag: v3.11.3

  prometheusOperator:
    image:
      registry: ECR_REGISTRY
      repository: prometheus-operator
      tag: v0.90.1
    prometheusConfigReloader:
      image:
        registry: ECR_REGISTRY
        repository: prometheus-operator
        tag: v0.90.1
    admissionWebhooks:
      patch:
        image:
          registry: ECR_REGISTRY
          repository: kube-webhook-certgen
          tag: 1.8.2

  grafana:
    enabled: true
    image:
      registry: ECR_REGISTRY
      repository: grafana
      tag: "13.0.1"
    defaultDashboardsEnabled: true
    sidecar:
      image:
        registry: ECR_REGISTRY
        repository: k8s-sidecar
        tag: "2.7.1"
      dashboards:
        enabled: true
        searchNamespace: ALL
      datasources:
        enabled: true
        defaultDatasourceEnabled: true
        isDefaultDatasource: true
        name: Prometheus
        uid: prometheus
        alertmanager:
          enabled: false
    additionalDataSources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://observability-loki-gateway
        editable: true
        jsonData:
          maxLines: 1000
    service:
      type: ClusterIP
      port: 80
      targetPort: 3000

  kube-state-metrics:
    image:
      registry: ECR_REGISTRY
      repository: kube-state-metrics
      tag: v2.18.0

  prometheus-node-exporter:
    image:
      registry: ECR_REGISTRY
      repository: node-exporter
      tag: v1.11.1

loki:
  deploymentMode: SingleBinary
  loki:
    image:
      registry: ECR_REGISTRY
      repository: loki
      tag: "3.6.7"
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage:
      type: filesystem
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 10Gi
  gateway:
    image:
      registry: ECR_REGISTRY
      repository: nginx-unprivileged
      tag: 1.29-alpine
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  lokiCanary:
    enabled: false
  test:
    enabled: false

promtail:
  image:
    registry: ECR_REGISTRY
    repository: promtail
    tag: "3.5.1"
  config:
    clients:
      - url: http://observability-loki-gateway/loki/api/v1/push
  serviceMonitor:
    enabled: true

dashboard:
  enabled: true

grafanaTargetGroupBinding:
  enabled: true
  # targetGroupArn is replaced by bootstrap-gitea.sh before push.
  targetGroupArn: GITEA_GRAFANA_TARGET_GROUP_ARN
  targetType: ip
  serviceName: observability-kube-prometheus-grafana
  servicePort: 80
