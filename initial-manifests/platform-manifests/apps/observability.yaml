apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: GITEA_PLATFORM_MANIFESTS_URL
    targetRevision: main
    # Umbrella chart lives in platform-manifests, not express-app.
    # The chart/ directory bundles kube-prometheus-stack + loki + promtail.
    path: observability/chart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
