apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: express-app
  namespace: argocd
  annotations:
    # Image Updater watches the app ECR repo and writes the new tag back to
    # values-override.yaml in the express-app repo on Gitea.
    argocd-image-updater.argoproj.io/image-list: "app=APP_ECR_IMAGE_URI"
    argocd-image-updater.argoproj.io/app.update-strategy: newest-build
    argocd-image-updater.argoproj.io/write-back-method: "git:secret:argocd/argocd-image-updater-gitea-creds"
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/write-back-target: "helmvalues:chart/values-override.yaml"
    argocd-image-updater.argoproj.io/app.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/app.helm.image-tag: image.tag
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: GITEA_EXPRESS_APP_URL
    targetRevision: main
    path: chart
    helm:
      valueFiles:
        - values.yaml
        - values-override.yaml
      parameters:
        - name: targetGroupBinding.enabled
          value: "true"
        - name: targetGroupBinding.targetGroupArn
          value: GITEA_APP_TARGET_GROUP_ARN
        - name: targetGroupBinding.targetType
          value: ip
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
