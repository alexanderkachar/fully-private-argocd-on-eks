targetGroupBinding:
  targetGroupArn: ""
  targetType: ip
  # ArgoCD server listens on HTTP when TLS is terminated at the internal ALB.
  port: 80

repoCredentials:
  secretName: argocd-gitea-creds
  repoURL: ""
  username: fpargo-admin
  tokenSsmParameter: /fp-argo/gitea/platform-deploy-token

rootApplication:
  name: root
  repoURL: ""
  targetRevision: main
  path: apps
