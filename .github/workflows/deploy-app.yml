name: Build and Push

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/deploy-app.yml"

permissions:
  contents: read
  id-token: write

env:
  APP_DIR: app
  DOCKERFILE: app/Dockerfile
  IMAGE_TAG: ${{ github.sha }}

  AWS_REGION: ${{ vars.AWS_REGION }}
  APP_ECR_REPOSITORY: ${{ vars.APP_ECR_REPOSITORY }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: self-hosted

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials from OIDC role
        if: ${{ vars.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Resolve ECR registry
        id: ecr
        shell: bash
        run: |
          set -euo pipefail
          : "${AWS_REGION:?Set GitHub variable AWS_REGION.}"
          : "${APP_ECR_REPOSITORY:?Set GitHub variable APP_ECR_REPOSITORY.}"
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "ecr_registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${ECR_REGISTRY}/${APP_ECR_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to Amazon ECR
        shell: bash
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${{ steps.ecr.outputs.ecr_registry }}"

      - name: Build and push Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --file "$DOCKERFILE" \
            --tag "${{ steps.ecr.outputs.image_uri }}" \
            "$APP_DIR"
          docker push "${{ steps.ecr.outputs.image_uri }}"
